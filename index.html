<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScholarSync</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>

    <section>
        <div class="login-box">
          <form action="">
            <h2>Login</h2>
          
            <div class="input-box">
              <span class="icon"><ion-icon name="person"></ion-icon></span>
              <input type="text" id="loginUsername" required />
              <label>Username</label>
            </div>

            <div class="input-box">
              <span class="icon"><ion-icon name="eye-off" id="togglePassword" style="cursor: pointer;"></ion-icon></span>
              <input type="password" id="loginPassword" required />
              <label>Password</label>
            </div>
                        
            <button type="submit">Login</button>

            <div class="register-link">
              <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
          </form>
        </div>
    </section>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
      const loginForm = document.querySelector('form');

      const passwordInput = document.getElementById('loginPassword');
      const togglePasswordIcon = document.getElementById('togglePassword');

      // Toggle password visibility
      togglePasswordIcon.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          togglePasswordIcon.setAttribute('name', type === 'password' ? 'eye-off' : 'eye');
      });

      // Handle Form Submission
      loginForm.addEventListener('submit', (e) => {
          e.preventDefault();

          const usernameInput = document.getElementById('loginUsername').value;
          const passwordValue = passwordInput.value; 

          let users = [];

          try {
              users = JSON.parse(localStorage.getItem('users')) || [];
          } catch {
              users = [];
          }

          // Match credentials
          const user = users.find(u => u.username === usernameInput && u.password === passwordValue);

          if (user) {
              alert(`Welcome to ScholarSync, ${user.firstName}!`);
              
              const sessionData = { 
                  username: user.username, 
                  email: user.email,
                  firstName: user.firstName,
                  lastName: user.lastName
              };
              
              // Standard session storage handling since Remember Me was removed
              sessionStorage.setItem('isLoggedIn', 'true');
              sessionStorage.setItem('currentUser', JSON.stringify(sessionData));

              window.location.href = "dashboard.html";
          } else {
              alert("Invalid Username or Password.");
          }
      });
    </script>

  </body>
</html>
